<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>

  <!-- ===== Reggie Dog Badge (centered left) ===== -->
  <g transform="translate(340, 315)">
    <!-- Outer golden ring -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="#f59e0b" stroke-width="12"/>
    <!-- Dark inner circle -->
    <circle cx="0" cy="0" r="185" fill="#1b4965"/>
    <!-- Inner dashed ring -->
    <circle cx="0" cy="0" r="170" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,4"/>

    <!-- Dog face — simplified Reggie -->
    <g transform="translate(0, -30)">
      <!-- Head shape -->
      <ellipse cx="0" cy="0" rx="65" ry="55" fill="#c87533"/>
      <!-- Lighter muzzle -->
      <ellipse cx="0" cy="22" rx="38" ry="28" fill="#e8c590"/>
      <!-- Left ear (floppy) -->
      <ellipse cx="-52" cy="-35" rx="22" ry="38" fill="#8b4513" transform="rotate(-20, -52, -35)"/>
      <!-- Right ear (floppy) -->
      <ellipse cx="52" cy="-35" rx="22" ry="38" fill="#8b4513" transform="rotate(20, 52, -35)"/>
      <!-- Left eye -->
      <ellipse cx="-20" cy="-8" rx="10" ry="11" fill="white"/>
      <circle cx="-18" cy="-6" r="6" fill="#2c1810"/>
      <circle cx="-16" cy="-8" r="2.5" fill="white"/>
      <!-- Right eye -->
      <ellipse cx="20" cy="-8" rx="10" ry="11" fill="white"/>
      <circle cx="18" cy="-6" r="6" fill="#2c1810"/>
      <circle cx="16" cy="-8" r="2.5" fill="white"/>
      <!-- Nose -->
      <ellipse cx="0" cy="10" rx="12" ry="9" fill="#2c1810"/>
      <ellipse cx="-3" cy="7" rx="4" ry="3" fill="#4a3728" opacity="0.5"/>
      <!-- Mouth -->
      <path d="M -8,18 Q 0,28 8,18" fill="none" stroke="#2c1810" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Tongue -->
      <ellipse cx="0" cy="26" rx="6" ry="8" fill="#e85d5d"/>
      <!-- Eyebrows -->
      <path d="M -30,-18 Q -20,-26 -10,-18" fill="none" stroke="#8b4513" stroke-width="3" stroke-linecap="round"/>
      <path d="M 10,-18 Q 20,-26 30,-18" fill="none" stroke="#8b4513" stroke-width="3" stroke-linecap="round"/>
      <!-- Collar -->
      <rect x="-40" y="42" width="80" height="14" rx="7" fill="#dc3545"/>
      <circle cx="0" cy="56" r="7" fill="#f59e0b" stroke="#c87a1e" stroke-width="1"/>
      <text x="0" y="59" text-anchor="middle" font-family="Arial" font-size="8" font-weight="800" fill="#8b4513">R</text>
    </g>

    <!-- "QUALITY AUDIT" curved on top -->
    <path id="topArc" d="M -145,-45 A 150,150 0 0,1 145,-45" fill="none"/>
    <text font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#f59e0b" letter-spacing="5">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">QUALITY AUDIT</textPath>
    </text>

    <!-- RefrigiWear text inside badge -->
    <text x="0" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="white" font-style="italic">RefrigiWear</text>

    <!-- "DASHBOARD" curved on bottom -->
    <path id="bottomArc" d="M -140,100 A 155,155 0 0,0 140,100" fill="none"/>
    <text font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f59e0b" letter-spacing="6">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">DASHBOARD</textPath>
    </text>

    <!-- Small green checkmark badge -->
    <g transform="translate(120, -140)">
      <circle cx="0" cy="0" r="24" fill="#198754" stroke="#0f172a" stroke-width="3"/>
      <path d="M-10,1 L-4,8 L10,-8" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ===== Title text (right side) ===== -->
  <g transform="translate(650, 240)">
    <text font-family="Georgia, serif" font-size="58" font-weight="700" fill="white" font-style="italic">RefrigiWear</text>
    <text font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#f59e0b" y="60">Quality Audit</text>
    <text font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#f59e0b" y="110">Dashboard</text>
  </g>
</svg>